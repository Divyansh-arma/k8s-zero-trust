apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
spec:
  validationFailureAction: Enforce   # Blocks the request outright
  background: true                   # Also scans existing resources
  rules:
    - name: disallow-latest-tag
      match:
        any:
          - resources:
              kinds: [Pod]
      validate:
        message: "The 'latest' image tag is not allowed. Use a specific version."
        pattern:
          spec:
            containers:
              - image: "!*:latest"    #that tag must NOT be 'latest'