---
# Service Account for Admin users
apiVersion: v1
kind: ServiceAccount
metadata:
  name: admin-user
  namespace: kube-system

---
# Service Account for Developers
apiVersion: v1
kind: ServiceAccount
metadata:
  name: developer-user
  namespace: development

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: developer-user
  namespace: staging

---
# Service Account for Read-Only users
apiVersion: v1
kind: ServiceAccount
metadata:
  name: readonly-user
  namespace: development

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: readonly-user
  namespace: staging

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: readonly-user
  namespace: production
