---
# ClusterRoleBinding for Admin
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: admin-user-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: admin-role
subjects:
  - kind: ServiceAccount
    name: admin-user
    namespace: kube-system

---
# RoleBinding for Developer in development namespace
# Uses ClusterRole to avoid duplication
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: developer-user-binding
  namespace: development
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: developer-role
subjects:
  - kind: ServiceAccount
    name: developer-user
    namespace: development

---
# RoleBinding for Developer in staging namespace
# Uses ClusterRole to avoid duplication
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: developer-user-binding
  namespace: staging
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: developer-role
subjects:
  - kind: ServiceAccount
    name: developer-user
    namespace: staging

---
# RoleBinding for Read-Only in development namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: readonly-user-binding
  namespace: development
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: read-only-role
subjects:
  - kind: ServiceAccount
    name: readonly-user
    namespace: development

---
# RoleBinding for Read-Only in staging namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: readonly-user-binding
  namespace: staging
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: read-only-role
subjects:
  - kind: ServiceAccount
    name: readonly-user
    namespace: staging

---
# RoleBinding for Read-Only in production namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: readonly-user-binding
  namespace: production
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: read-only-role
subjects:
  - kind: ServiceAccount
    name: readonly-user
    namespace: production
